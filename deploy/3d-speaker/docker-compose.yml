# ========================================
# Speaker Analysis Service - Docker Compose
# ========================================

services:
  speaker-analysis:
    image: "${SA_IMAGE:-jusha-asr-speaker:1.1.7}"
    pull_policy: never
    container_name: "${SA_CONTAINER_NAME:-jusha-asr-speaker}"
    restart: unless-stopped

    ports:
      - "${SA_PORT:-9852}:8100"

    environment:
      # 仅暴露宿主机的指定 GPU 给容器；容器内可见设备会重新编号为 cuda:0
      - NVIDIA_VISIBLE_DEVICES=${SA_GPU_ID:-0}
      - DEVICE=${SA_DEVICE:-cuda:0}
      - WORKERS=${WORKERS:-1}
      - HOST=0.0.0.0
      - PORT=8100
      - HF_HUB_OFFLINE=1
      - HF_DATASETS_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - MODELSCOPE_OFFLINE=1
      - MODELSCOPE_CACHE=/app/data/native_cache
      - ALLOW_INCOMPLETE_NATIVE_CACHE=${ALLOW_INCOMPLETE_NATIVE_CACHE:-0}
      # 如需分开指定设备，可自行追加以下环境变量
      # - EMBEDDING_DEVICE=${SA_EMBEDDING_DEVICE:-cuda:0}
      # - VAD_DEVICE=${SA_VAD_DEVICE:-cuda:0}

    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config:/app/config:ro
      # 默认挂载宿主机模型目录，适配打包环境与部署环境分离。
      - ./models:/app/models:ro

    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G
          devices:
            - driver: nvidia
              device_ids: ["${SA_GPU_ID:-0}"]
              capabilities: [gpu]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

    networks:
      - jusha-asr-net

networks:
  jusha-asr-net:
    name: "${SA_DOCKER_NETWORK_NAME:-jusha-asr}"
    external: true