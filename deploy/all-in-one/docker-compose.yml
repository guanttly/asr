version: '3.9'

services:
  asr-suite:
    build:
      context: ../..
      dockerfile: deploy/all-in-one/Dockerfile
    image: jusha-asr-business:latest
    container_name: jusha-asr-business
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:${ASR_DOCKER_GATEWAY:-10.248.0.1}'
    ports:
      - '9855:80'
      - '9856:443'
    environment:
      ASR_ENABLE_HTTPS: '1'
      ASR_HTTP_REDIRECT_TO_HTTPS: '0'
      ASR_TLS_COMMON_NAME: localhost
      ASR_TLS_ALT_NAMES: DNS:localhost,IP:127.0.0.1
      ASR_MYSQL_ROOT_PASSWORD: change-me
      ASR_MYSQL_DATABASE: asr
      ASR_BOOTSTRAP_ADMIN_USERNAME: admin
      ASR_BOOTSTRAP_ADMIN_PASSWORD: change-me-now
      ASR_BOOTSTRAP_ADMIN_DISPLAY_NAME: 系统管理员
      ASR_JWT_SECRET: replace-with-random-secret
      ASR_SERVICES_ASR: http://jusha-asr-asr:8000
      ASR_SERVICES_ASR_STREAM: ''
      ASR_SERVICES_SPEAKER_SERVICE_URL: http://jusha-asr-speaker:8100
      ASR_SERVICES_SUMMARY_MODEL: qwen3-4b
    volumes:
      - ./runtime/mysql:/var/lib/asr/mysql
      - ./runtime/certs:/var/lib/asr/certs
      - ./runtime/downloads:/var/lib/asr/downloads
      - ./runtime/tmp:/var/lib/asr/tmp
      - ./runtime/uploads:/var/lib/asr/uploads
      - ./runtime/term-catalog:/var/lib/asr/term-catalog
    networks:
      - asr-internal
    healthcheck:
      test: ["CMD-SHELL", "/app/scripts/healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 240s

networks:
  asr-internal:
    name: ${ASR_DOCKER_NETWORK_NAME:-jusha-asr}
    driver: bridge
    ipam:
      config:
        - subnet: ${ASR_DOCKER_SUBNET:-10.248.0.0/24}
          gateway: ${ASR_DOCKER_GATEWAY:-10.248.0.1}
