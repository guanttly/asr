# ========================================
# Speaker Analysis Service - Docker Compose
# ========================================

services:
  speaker-analysis:
    image: "${SA_IMAGE:-speaker-analysis-service:1.1.0}"
    pull_policy: never
    container_name: speaker-analysis
    restart: unless-stopped

    ports:
      - "${SA_PORT:-8100}:8100"

    environment:
      - DEVICE=cuda:2
      - WORKERS=${WORKERS:-1}
      - HOST=0.0.0.0
      - PORT=8100
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - MODELSCOPE_CACHE=/app/models
      # 如需分开指定设备，可自行追加以下环境变量
      # - EMBEDDING_DEVICE=cuda:0
      # - VAD_DEVICE=cuda:0

    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      # 如果需要从外部挂载模型（替代镜像内置模型）
      # - ./models:/app/models:ro
      # 如果需要从外部挂载配置
      # - ./config/settings.yaml:/app/config/settings.yaml:ro

    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"