version: "3.8"

services:
  speaker-diarization:
    image: speaker-diarization-service:1.0.0
    container_name: speaker-diarization
    restart: unless-stopped
    ports:
      - "8100:8100"
    volumes:
      # 声纹数据持久化
      - speaker_data:/app/data
      # 日志持久化
      - speaker_logs:/app/logs
      # 如需外挂模型权重（替代镜像内置）
      # - ./models:/app/models:ro
      # 如需外挂配置
      # - ./config/settings.yaml:/app/config/settings.yaml:ro
    environment:
      - PYTHONUNBUFFERED=1
    # GPU 支持（取消注释以启用）
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8100/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  speaker_data:
    driver: local
  speaker_logs:
    driver: local
