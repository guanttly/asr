# ========================================
# Speaker Analysis Service - Docker Compose
# ========================================

services:
  speaker-analysis:
    image: "${SA_IMAGE:-speaker-analysis-service:1.1.0}"
    pull_policy: never
    container_name: speaker-analysis
    restart: unless-stopped

    ports:
      - "${SA_PORT:-10002}:8100"

    environment:
      # 仅暴露宿主机的指定 GPU 给容器；容器内可见设备会重新编号为 cuda:0
      - NVIDIA_VISIBLE_DEVICES=${SA_GPU_ID:-2}
      - DEVICE=${SA_DEVICE:-cuda:0}
      - WORKERS=${WORKERS:-1}
      - HOST=0.0.0.0
      - PORT=8100
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - MODELSCOPE_CACHE=/app/data/native_cache
      # 如需分开指定设备，可自行追加以下环境变量
      # - EMBEDDING_DEVICE=${SA_EMBEDDING_DEVICE:-cuda:0}
      # - VAD_DEVICE=${SA_VAD_DEVICE:-cuda:0}

    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      # 默认挂载宿主机模型目录，适配打包环境与部署环境分离。
      - ./models:/app/models:ro
      # 如果需要从外部挂载配置
      # - ./config/settings.yaml:/app/config/settings.yaml:ro

    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G
          devices:
            - driver: nvidia
              device_ids: ["${SA_GPU_ID:-2}"]
              capabilities: [gpu]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"