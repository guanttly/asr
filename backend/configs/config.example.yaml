app_name: asr

server:
  host: 0.0.0.0
  port: 10010
  asr_api_port: 10011
  admin_api_port: 10012
  nlp_api_port: 10013

database:
  host: mysql
  port: 3306
  user: root
  password: change-me
  dbname: asr

jwt:
  secret: replace-with-random-secret
  expires_in: 86400

bootstrap:
  admin_username: admin
  admin_password: change-me-now
  admin_display_name: System Administrator

product:
  # standard: 仅开放实时语音识别和批量转写
  # advanced: 额外开放会议纪要、声纹库和终端语音控制
  edition: advanced

services:
  # Batch upload / task sync endpoint. Supports qwen-asr-serve task APIs and OpenAI-compatible /v1/audio/transcriptions.
  asr: http://qwen-asr-batch:8000
  # OpenAI-compatible ASR may reject files over this size via audio_filesize_mb.
  asr_max_audio_size_mb: 25
  asr_batch_sync_interval_sec: 20
  asr_batch_sync_batch_size: 20
  asr_batch_sync_warn_threshold: 3
  dashboard_retry_history_limit: 5
  diarization_url: http://pyannote:8001
  # Speaker Analysis Service / 3D-Speaker 地址，用于声纹注册、列表和 diarize-identify。
  speaker_analysis_url: http://speaker-analysis:8100
  summary_model: qwen3-4b

upload:
  dir: uploads
  public_base_url: http://localhost:10010
  max_audio_size_mb: 1024

download:
  dir: downloads
  public_base_path: /downloads/files

gateway:
  asr_api: http://asr-api:10011
  admin_api: http://admin-api:10012
  nlp_api: http://nlp-api:10013